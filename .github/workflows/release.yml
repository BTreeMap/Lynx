name: Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: lynx
            asset_name: lynx-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: lynx
            asset_name: lynx-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: lynx
            asset_name: lynx-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: lynx
            asset_name: lynx-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: lynx.exe
            asset_name: lynx-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Verify frontend build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist directory not found!"
            exit 1
          fi
          echo "Frontend dist contents:"
          ls -la frontend/dist/
          echo "Checking .dockerignore:"
          cat .dockerignore
          echo "Files in frontend directory:"
          ls -la frontend/
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore and save trusted release Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-lynx-rust
          shared-key: release-${{ matrix.target }}
          cache-targets: true
          cache-bin: false
          save-if: ${{ github.event_name == 'release' && github.event.action == 'published' }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Rename binary
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          else
            mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Upload release asset archive
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  upload-release-assets:
    needs: build-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - asset_name: lynx-linux-amd64
          - asset_name: lynx-linux-arm64
          - asset_name: lynx-macos-amd64
          - asset_name: lynx-macos-arm64
          - asset_name: lynx-windows-amd64.exe

    steps:
      - name: Download release asset archive
        uses: actions/download-artifact@v8
        with:
          name: release-asset-${{ matrix.asset_name }}
          path: /tmp/release-assets

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /tmp/release-assets/${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream

  set-env:
    runs-on: ubuntu-24.04
    permissions: {}
    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.env_vars.outputs.DOCKER_IMAGE_NAME }}
      TAG_NAME: ${{ steps.env_vars.outputs.TAG_NAME }}
      SOURCE_DATE_EPOCH_VAR: ${{ steps.dates.outputs.SOURCE_DATE_EPOCH_VAR }}
    steps:
      - name: Set repository name and tag
        id: env_vars
        run: |
          echo "DOCKER_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate date strings
        id: dates
        run: |
          now=$(date '+%s')
          year_month=$(date -u -d "@$now" '+%Y-%m')
          echo "SOURCE_DATE_EPOCH_VAR=$(date -u -d "${year_month}-01 00:00:00" '+%s')" >> $GITHUB_OUTPUT

  build-docker-release:
    needs: set-env
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            variant: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            variant: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Verify frontend build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist directory not found!"
            exit 1
          fi
          echo "Frontend dist contents:"
          ls -la frontend/dist/
          echo "Checking .dockerignore:"
          cat .dockerignore
          echo "Files in frontend directory:"
          ls -la frontend/
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: lynx-release-build:${{ matrix.variant }}
          cache-from: type=gha,scope=lynx-docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=lynx-docker-${{ matrix.variant }}
        env:
          SOURCE_DATE_EPOCH: ${{ needs.set-env.outputs.SOURCE_DATE_EPOCH_VAR }}

      - name: Save Docker image archive
        run: docker save lynx-release-build:${{ matrix.variant }} -o /tmp/lynx-release-${{ matrix.variant }}.tar

      - name: Upload Docker image archive
        uses: actions/upload-artifact@v7
        with:
          name: release-docker-image-${{ matrix.variant }}
          path: /tmp/lynx-release-${{ matrix.variant }}.tar
          retention-days: 1

  publish-docker-release:
    needs: [set-env, build-docker-release]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [amd64, arm64]

    steps:
      - name: Download Docker image archive
        uses: actions/download-artifact@v8
        with:
          name: release-docker-image-${{ matrix.variant }}
          path: /tmp

      - name: Load Docker image archive
        run: docker load -i /tmp/lynx-release-${{ matrix.variant }}.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          destination="${DOCKER_IMAGE_NAME}:${TAG_NAME}.${{ matrix.variant }}"
          docker tag lynx-release-build:${{ matrix.variant }} "$destination"
          docker push "$destination"
        env:
          DOCKER_IMAGE_NAME: ${{ needs.set-env.outputs.DOCKER_IMAGE_NAME }}
          TAG_NAME: ${{ needs.set-env.outputs.TAG_NAME }}

  create-docker-manifest:
    needs: [set-env, publish-docker-release]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          # The platform-specific tags
          AMD64_TAG="${DOCKER_IMAGE_NAME}:${TAG_NAME}.amd64"
          ARM64_TAG="${DOCKER_IMAGE_NAME}:${TAG_NAME}.arm64"

          # Create manifest for the release tag and stable tag
          docker buildx imagetools create \
            --tag "${DOCKER_IMAGE_NAME}:${TAG_NAME}" \
            --tag "${DOCKER_IMAGE_NAME}:stable" \
            "${AMD64_TAG}" "${ARM64_TAG}"
        env:
          DOCKER_IMAGE_NAME: ${{ needs.set-env.outputs.DOCKER_IMAGE_NAME }}
          TAG_NAME: ${{ needs.set-env.outputs.TAG_NAME }}
