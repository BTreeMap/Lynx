name: Build and Publish Docker image to GHCR

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 16 * * *'
  push:
    branches: [ "main" ]

permissions: {}

jobs:
  set-env:
    runs-on: ubuntu-24.04
    permissions: {}
    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.env_vars.outputs.DOCKER_IMAGE_NAME }}
      SHA_VAR: ${{ steps.env_vars.outputs.SHA_VAR }}
      DATE_VAR: ${{ steps.dates.outputs.DATE_VAR }}
      DATE_TIME_VAR: ${{ steps.dates.outputs.DATE_TIME_VAR }}
      SOURCE_DATE_EPOCH_VAR: ${{ steps.dates.outputs.SOURCE_DATE_EPOCH_VAR }}
    steps:
      - name: Set repository name and SHA
        id: env_vars
        run: |
          echo "DOCKER_IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          echo "SHA_VAR=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Generate date and time strings
        id: dates
        run: |
          now=$(date '+%s')
          echo "DATE_VAR=$(date -u -d "@$now" '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "DATE_TIME_VAR=$(date -u -d "@$now" '+%Y-%m-%d.%H-%M-%S')" >> $GITHUB_OUTPUT
          year_month=$(date -u -d "@$now" '+%Y-%m')
          echo "SOURCE_DATE_EPOCH_VAR=$(date -u -d "${year_month}-01 00:00:00" '+%s')" >> $GITHUB_OUTPUT

  build-matrix:
    needs: set-env
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            variant: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            variant: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up cached frontend dependencies
        uses: ./.github/actions/setup-frontend
        with:
          save_cache: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'schedule') }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist directory not found!"
            exit 1
          fi
          echo "Frontend dist contents:"
          ls -la frontend/dist/
          echo "Checking .dockerignore:"
          cat .dockerignore
          echo "Files in frontend directory:"
          ls -la frontend/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: lynx-build:${{ matrix.variant }}
          cache-from: type=gha,scope=lynx-docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=lynx-docker-${{ matrix.variant }}
        env:
          SOURCE_DATE_EPOCH: ${{ needs.set-env.outputs.SOURCE_DATE_EPOCH_VAR }}

      - name: Save Docker image archive
        run: docker save lynx-build:${{ matrix.variant }} -o /tmp/lynx-${{ matrix.variant }}.tar

      - name: Upload Docker image archive
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp/lynx-${{ matrix.variant }}.tar
          retention-days: 1

  publish-matrix:
    needs: [set-env, build-matrix]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: [amd64, arm64]

    steps:
      - name: Download Docker image archive
        uses: actions/download-artifact@v8
        with:
          name: docker-image-${{ matrix.variant }}
          path: /tmp

      - name: Load Docker image archive
        run: docker load -i /tmp/lynx-${{ matrix.variant }}.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          source_image="lynx-build:${{ matrix.variant }}"
          tags=(
            "latest.${{ matrix.variant }}"
            "${DATE_VAR}.${{ matrix.variant }}"
            "${DATE_TIME_VAR}.${{ matrix.variant }}"
            "${SHA_VAR}.${{ matrix.variant }}"
            "${SHA_VAR}.${DATE_VAR}.${{ matrix.variant }}"
            "${SHA_VAR}.${DATE_TIME_VAR}.${{ matrix.variant }}"
          )
          for tag in "${tags[@]}"; do
            destination="${DOCKER_IMAGE_NAME}:${tag}"
            docker tag "$source_image" "$destination"
            docker push "$destination"
          done
        env:
          DOCKER_IMAGE_NAME: ${{ needs.set-env.outputs.DOCKER_IMAGE_NAME }}
          DATE_VAR: ${{ needs.set-env.outputs.DATE_VAR }}
          DATE_TIME_VAR: ${{ needs.set-env.outputs.DATE_TIME_VAR }}
          SHA_VAR: ${{ needs.set-env.outputs.SHA_VAR }}

  create-manifest:
    needs: [set-env, publish-matrix]
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          # The most specific tags for the platform-specific images
          AMD64_TAG="${DOCKER_IMAGE_NAME}:${SHA_VAR}.${DATE_TIME_VAR}.amd64"
          ARM64_TAG="${DOCKER_IMAGE_NAME}:${SHA_VAR}.${DATE_TIME_VAR}.arm64"

          # All the tags we want to create
          TAG_OPTIONS=()
          TAGS=(
            "latest"
            "${DATE_VAR}"
            "${DATE_TIME_VAR}"
            "${SHA_VAR}"
            "${SHA_VAR}.${DATE_VAR}"
            "${SHA_VAR}.${DATE_TIME_VAR}"
          )

          # Build the tag options for docker buildx imagetools
          for tag in "${TAGS[@]}"; do
            TAG_OPTIONS+=(--tag "${DOCKER_IMAGE_NAME}:${tag}")
          done

          # Create a single manifest with multiple tags
          echo "Creating manifest with tags: ${TAGS[*]}"
          docker buildx imagetools create "${TAG_OPTIONS[@]}" "${AMD64_TAG}" "${ARM64_TAG}"
        env:
          DOCKER_IMAGE_NAME: ${{ needs.set-env.outputs.DOCKER_IMAGE_NAME }}
          DATE_VAR: ${{ needs.set-env.outputs.DATE_VAR }}
          DATE_TIME_VAR: ${{ needs.set-env.outputs.DATE_TIME_VAR }}
          SHA_VAR: ${{ needs.set-env.outputs.SHA_VAR }}
