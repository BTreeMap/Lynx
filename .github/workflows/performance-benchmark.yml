name: Performance Benchmarks

on:
  workflow_run:
    workflows: ["Build and Publish Docker image to GHCR"]
    types: [completed]
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: Duration of each benchmark stage in seconds
        required: false
        default: '30'
      max_concurrency:
        description: Maximum native Rust worker count
        required: false
        default: '10000'

permissions: {}

jobs:
  benchmark-postgres:
    name: Native Benchmark (PostgreSQL)
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgresql://lynx:lynx_benchmark_pass@localhost:5432/lynx
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: lynx_benchmark_pass
          POSTGRES_DB: lynx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout benchmarked source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          submodules: recursive

      - name: Set image reference
        id: image
        run: echo "reference=ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up cached frontend dependencies
        uses: ./.github/actions/setup-frontend
        with:
          save_cache: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == github.event.repository.default_branch }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore and save trusted profiling Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-lynx-rust
          shared-key: profiling
          cache-targets: true
          cache-bin: false
          save-if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == github.event.repository.default_branch }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start benchmark service
        run: |
          docker pull "${{ steps.image.outputs.reference }}"
          docker run --detach --name lynx --network host --userns=host \
            --env DATABASE_BACKEND=postgres --env DATABASE_URL \
            --env DATABASE_MAX_CONNECTIONS=50 --env AUTH_MODE=none \
            --env API_HOST=0.0.0.0 --env API_PORT=8080 \
            --env REDIRECT_HOST=0.0.0.0 --env REDIRECT_PORT=3000 \
            --env CACHE_MAX_ENTRIES=500000 \
            --env CACHE_FLUSH_INTERVAL_SECS=5 \
            --env ACTOR_BUFFER_SIZE=1000000 \
            --env ACTOR_FLUSH_INTERVAL_MS=100 \
            "${{ steps.image.outputs.reference }}"

      - name: Run native benchmark suite
        run: |
          ulimit -n 65535
          cargo test --profile profiling --locked --test benchmark_harness \
            native_external_benchmark -- --ignored --nocapture
        env:
          BENCHMARK_SUITE: standard
          BENCHMARK_LABEL: postgres
          BENCHMARK_OUTPUT_DIR: benchmark-results
          BENCHMARK_DURATION_SECS: ${{ github.event.inputs.duration_seconds || '30' }}
          BENCHMARK_MAX_CONCURRENCY: ${{ github.event.inputs.max_concurrency || '10000' }}
          RUST_LOG: info

      - name: Publish native report
        if: always()
        run: cat benchmark-results/native-benchmark-postgres.md >> "$GITHUB_STEP_SUMMARY"

      - name: Collect service logs
        if: always()
        run: docker logs lynx > benchmark-results/lynx-logs.txt 2>&1 || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-benchmark-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          path: benchmark-results/
          if-no-files-found: error
          retention-days: 90

      - name: Clean up service
        if: always()
        run: docker rm --force lynx || true

  benchmark-analytics:
    name: Native Analytics Impact Benchmark
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgresql://lynx:lynx_benchmark_pass@localhost:5432/lynx
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: lynx_benchmark_pass
          POSTGRES_DB: lynx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout benchmarked source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          submodules: recursive

      - name: Set image reference
        id: image
        run: echo "reference=ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up cached frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore trusted profiling Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-lynx-rust
          shared-key: profiling
          cache-targets: true
          cache-bin: false
          save-if: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run baseline without analytics
        run: |
          docker pull "${{ steps.image.outputs.reference }}"
          docker run --detach --name lynx-baseline --network host --userns=host \
            --env DATABASE_BACKEND=postgres --env DATABASE_URL \
            --env DATABASE_MAX_CONNECTIONS=50 --env AUTH_MODE=none \
            --env API_HOST=0.0.0.0 --env API_PORT=8080 \
            --env REDIRECT_HOST=0.0.0.0 --env REDIRECT_PORT=3000 \
            --env CACHE_MAX_ENTRIES=500000 \
            --env CACHE_FLUSH_INTERVAL_SECS=5 \
            --env ACTOR_BUFFER_SIZE=1000000 \
            --env ACTOR_FLUSH_INTERVAL_MS=100 \
            --env ANALYTICS_ENABLED=false \
            "${{ steps.image.outputs.reference }}"
          ulimit -n 65535
          cargo test --profile profiling --locked --test benchmark_harness \
            native_external_benchmark -- --ignored --nocapture
        env:
          BENCHMARK_SUITE: analytics
          BENCHMARK_LABEL: baseline
          BENCHMARK_OUTPUT_DIR: benchmark-results-analytics
          BENCHMARK_DURATION_SECS: ${{ github.event.inputs.duration_seconds || '30' }}
          BENCHMARK_MAX_CONCURRENCY: ${{ github.event.inputs.max_concurrency || '10000' }}
          RUST_LOG: info

      - name: Stop baseline service
        if: always()
        run: docker rm --force lynx-baseline || true

      - name: Run analytics-enabled benchmark
        run: |
          docker run --detach --name lynx-analytics --network host --userns=host \
            --env DATABASE_BACKEND=postgres --env DATABASE_URL \
            --env DATABASE_MAX_CONNECTIONS=50 --env AUTH_MODE=none \
            --env API_HOST=0.0.0.0 --env API_PORT=8080 \
            --env REDIRECT_HOST=0.0.0.0 --env REDIRECT_PORT=3000 \
            --env CACHE_MAX_ENTRIES=500000 \
            --env CACHE_FLUSH_INTERVAL_SECS=5 \
            --env ACTOR_BUFFER_SIZE=1000000 \
            --env ACTOR_FLUSH_INTERVAL_MS=100 \
            --env ANALYTICS_ENABLED=true \
            --env ANALYTICS_IP_ANONYMIZATION=true \
            --env ANALYTICS_TRUSTED_PROXY_MODE=none \
            --env ANALYTICS_FLUSH_INTERVAL_SECS=60 \
            "${{ steps.image.outputs.reference }}"
          ulimit -n 65535
          cargo test --profile profiling --locked --test benchmark_harness \
            native_external_benchmark -- --ignored --nocapture
        env:
          BENCHMARK_SUITE: analytics
          BENCHMARK_LABEL: analytics
          BENCHMARK_OUTPUT_DIR: benchmark-results-analytics
          BENCHMARK_COMPARE_BASELINE: benchmark-results-analytics/native-benchmark-baseline.json
          BENCHMARK_DURATION_SECS: ${{ github.event.inputs.duration_seconds || '30' }}
          BENCHMARK_MAX_CONCURRENCY: ${{ github.event.inputs.max_concurrency || '10000' }}
          RUST_LOG: info

      - name: Publish native comparison report
        if: always()
        run: cat benchmark-results-analytics/native-benchmark-analytics.md >> "$GITHUB_STEP_SUMMARY"

      - name: Collect analytics logs
        if: always()
        run: docker logs lynx-analytics > benchmark-results-analytics/lynx-analytics-logs.txt 2>&1 || true

      - name: Upload analytics benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-analytics-benchmark-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          path: benchmark-results-analytics/
          if-no-files-found: error
          retention-days: 90

      - name: Clean up analytics service
        if: always()
        run: docker rm --force lynx-analytics || true

  flamegraph-postgres:
    name: CPU Flamegraphs (PostgreSQL)
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgresql://lynx:lynx_benchmark_pass@localhost:5432/lynx
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: lynx_benchmark_pass
          POSTGRES_DB: lynx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout profiled source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          submodules: recursive

      - name: Set up cached frontend dependencies
        uses: ./.github/actions/setup-frontend

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore and save trusted flamegraph Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-lynx-rust
          shared-key: profiling-flamegraph
          cache-targets: true
          cache-bin: false
          save-if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == github.event.repository.default_branch }}

      - name: Capture representative flamegraphs
        run: >-
          cargo test --profile profiling --locked
          --features profiling
          --test performance_harness
          representative_hot_path_flamegraphs
          -- --ignored --nocapture
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
          PERF_FLAMEGRAPH_OUTPUT_DIR: target/flamegraphs
          PERF_FLAMEGRAPH_FREQUENCY_HZ: '99'
          PERF_FLAMEGRAPH_DURATION: ${{ github.event.inputs.duration_seconds || '30' }}s
          PERF_FLAMEGRAPH_REDIRECT_CONCURRENCY: '256'
          PERF_FLAMEGRAPH_API_CONCURRENCY: '64'

      - name: Publish flamegraph Markdown report
        if: always()
        env:
          FLAMEGRAPH_ARTIFACT: flamegraphs-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          report=target/flamegraphs/README.md
          if [[ -f "$report" ]]; then
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          else
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # Lynx Hot-Path Flamegraphs

          > Profiling did not produce a Markdown report. Inspect the first
          > failure in the capture step; any partial files are listed below.
          EOF
          fi

          {
            printf '\n## Artifact\n\n'
            printf 'Download `%s` from [this workflow run](%s/%s/actions/runs/%s).\n' \
              "$FLAMEGRAPH_ARTIFACT" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            if [[ -d target/flamegraphs ]]; then
              printf '\n### Generated files\n\n```text\n'
              find target/flamegraphs -maxdepth 1 -type f -printf '%f\t%k KiB\n' | sort
              printf '```\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload flamegraph artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flamegraphs-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          path: target/flamegraphs/
          if-no-files-found: error
          retention-days: 90
