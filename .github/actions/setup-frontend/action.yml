name: Set up frontend
description: Install locked frontend dependencies with an explicitly controlled npm cache.

inputs:
  save_cache:
    description: Save the npm dependency cache after a successful installation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: "24"

    - name: Resolve npm cache directory
      id: npm-cache-path
      shell: bash
      run: echo "path=$(npm config get cache)" >> "$GITHUB_OUTPUT"

    - name: Restore npm dependency cache
      id: npm-cache
      uses: actions/cache/restore@v6
      with:
        path: ${{ steps.npm-cache-path.outputs.path }}
        key: v1-lynx-npm-${{ runner.os }}-${{ runner.arch }}-node-24-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          v1-lynx-npm-${{ runner.os }}-${{ runner.arch }}-node-24-

    - name: Install frontend dependencies
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Save trusted npm dependency cache
      if: ${{ inputs.save_cache == 'true' && steps.npm-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v6
      with:
        path: ${{ steps.npm-cache-path.outputs.path }}
        key: ${{ steps.npm-cache.outputs.cache-primary-key }}
